<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Sujeitogram</title>
</head>
<body>
        <!-- AREA WRAPPER - QUE ENGLOBA TUDO-->
    <div id="wrapper">
        <!-- AREA CONTAINER -->
        <div id="container">
            <!-- Area esquerda-->
            <div class="column left"> 

                <div class="main"> </div>

            </div>

            <!--FIM DA AREA ESQUERDA-->

            <!-- Area direita-->
            <div class="column right">

                <div class="login-painel">

                    <div class="logo">
                        <img class="logo-img" src="assets/sujeitogram-logo.png" alt="logo do Sujeitogram">
                    </div>

                    <form>
                        <input placeholder="Telefone, usuario ou e-mail" type="text" name="username">
                        <input placeholder="Senha" type="password" name="password">
                        <br>
                        <input type="submit" value="Entrar">
                    </form>

                </div>
                <div class="infobox">
                    <p>Não possui uma conta? </p> <a href="cadastro.html"> Cadastre-se</a>
                </div>

                <div class="get-app-painel"> 
                    Obtenha o aplicativo.
                    <div class="app-buttons">
                        <a href="#">
                            <img src="assets/appstore.png" alt="Baixe na AppStore">
                        </a>
                        <a href="#">
                            <img src="assets/googleplay.png" alt="Baixe na googleplay">
                        </a>
                    </div>
                </div>
            </div>
            <!--FIM DA AREA ESQUERDA-->
        </div>
            <!--FIM DA AREA CONTAINER-->

            <!--INICIO RODAPE-->
        <footer>
            <div class="footer-inner">
                <a href="#">About us</a>
                <a href="#">Support</a>
                <a href="#">Blog</a>
                <a href="#">Press</a>
                <a href="#">API</a>
                <a href="#">Jobs</a>
                <a href="#">Privacy</a>
                <a href="#">Terms</a>
                <a href="#">Directory</a>
                <a href="#">Profiles</a>
                <a href="#">Hashtags</a>
                <a href="#">Language</a>
            <div class="text-small">@ 2026 Sujeitogram </div>
            </div>

        </footer>
    </div>
    
</body>
</html>
